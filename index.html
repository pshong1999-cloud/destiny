<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天机排盘 · 八字命理 · 六爻占卜 · 万年历</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
  <script type="module" crossorigin src="/destiny/assets/index-CSfekjgf.js"></script>
  <link rel="stylesheet" crossorigin href="/destiny/assets/index-37W32TiA.css">
</head>
<body style="background-color:var(--color-ink);min-height:100vh;font-family:var(--font-serif);color:var(--color-parchment)">
  <div id="app" style="max-width:72rem;margin:0 auto;padding:0 1rem 1.5rem">
    <!-- 标题区 -->
    <header style="text-align:center;margin-bottom:1.5rem">
      <h1 style="font-family:var(--font-brush);font-size:2.25rem;color:var(--color-gold);letter-spacing:0.1em;margin-bottom:0.25rem">天 机 排 盘</h1>
      <p style="color:var(--color-parchment-dark);opacity:0.6;font-size:0.875rem">命理 · 占卜 · 历法</p>
      <div style="width:6rem;height:1px;background:var(--color-gold);margin:0.75rem auto 0;opacity:0.4"></div>
    </header>

    <!-- 导航栏 -->
    <nav style="display:flex;justify-content:center;gap:0.5rem;margin-bottom:2rem" id="main-nav">
      <button data-page="bazi" class="nav-btn" style="cursor:pointer;background:var(--color-ink-light);border:2px solid var(--color-gold);border-radius:0.5rem;padding:0.5rem 1.25rem;font-family:var(--font-brush);font-size:1.125rem;color:var(--color-gold)">八字排盘</button>
      <button data-page="liuyao" class="nav-btn" style="cursor:pointer;background:var(--color-ink);border:2px solid rgba(212,168,67,0.3);border-radius:0.5rem;padding:0.5rem 1.25rem;font-family:var(--font-brush);font-size:1.125rem;color:var(--color-parchment-dark)">六爻占卜</button>
      <button data-page="calendar" class="nav-btn" style="cursor:pointer;background:var(--color-ink);border:2px solid rgba(212,168,67,0.3);border-radius:0.5rem;padding:0.5rem 1.25rem;font-family:var(--font-brush);font-size:1.125rem;color:var(--color-parchment-dark)">万年历</button>
      <button data-page="history" class="nav-btn" style="cursor:pointer;background:var(--color-ink);border:2px solid rgba(212,168,67,0.3);border-radius:0.5rem;padding:0.5rem 1.25rem;font-family:var(--font-brush);font-size:1.125rem;color:var(--color-parchment-dark)">历史记录</button>
    </nav>

    <!-- ===== 八字排盘页面 ===== -->
    <section id="page-bazi" class="page-section">
      <div id="bazi-input" style="margin-bottom:2rem"></div>
      <section id="bazi-result" style="display:none">
        <div id="export-bar" style="display:none;margin-bottom:1rem;justify-content:center;gap:0.75rem">
          <button id="btn-export-img" style="cursor:pointer;background:rgba(212,168,67,0.2);border:1px solid rgba(212,168,67,0.3);border-radius:0.5rem;padding:0.5rem 1rem;color:var(--color-gold);font-size:0.875rem">📸 导出图片</button>
          <button id="btn-export-text" style="cursor:pointer;background:rgba(212,168,67,0.2);border:1px solid rgba(212,168,67,0.3);border-radius:0.5rem;padding:0.5rem 1rem;color:var(--color-gold);font-size:0.875rem">📋 复制文字</button>
        </div>
        <div id="chart-area" style="margin-bottom:2rem"></div>
        <div id="analysis-area" style="margin-bottom:2rem"></div>
        <div id="dayun-area" style="margin-bottom:2rem"></div>
        <div id="reading-area" style="margin-bottom:2rem"></div>
      </section>
    </section>

    <!-- ===== 六爻占卜页面 ===== -->
    <section id="page-liuyao" class="page-section" style="display:none">
      <div id="liuyao-input" style="margin-bottom:2rem"></div>
      <section id="liuyao-result" style="display:none">
        <div id="liuyao-chart" style="margin-bottom:2rem"></div>
        <div id="liuyao-reading" style="margin-bottom:2rem"></div>
      </section>
    </section>

    <!-- ===== 万年历页面 ===== -->
    <section id="page-calendar" class="page-section" style="display:none">
      <div id="calendar-main"></div>
    </section>

    <!-- ===== 历史记录页面 ===== -->
    <section id="page-history" class="page-section" style="display:none">
      <div id="history-list"></div>
    </section>
  </div>

</body>
</html>

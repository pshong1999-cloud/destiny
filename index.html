<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>天机排盘 · 八字命理 · 六爻占卜 · 万年历</title>
  <!-- Google Fonts 可选增强：离线时自动用系统宋体/楷体，不影响功能 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700;900&family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
</head>
<body class="bg-[var(--color-ink)] min-h-screen font-[var(--font-serif)] text-[var(--color-parchment)]">
  <div id="app" class="max-w-6xl mx-auto px-4 py-6">
    <!-- 标题区 -->
    <header class="text-center mb-6">
      <h1 class="font-[var(--font-brush)] text-4xl text-[var(--color-gold)] tracking-widest mb-1">天 机 排 盘</h1>
      <p class="text-[var(--color-parchment-dark)] opacity-60 text-sm">命理 · 占卜 · 历法</p>
      <div class="w-24 h-0.5 bg-[var(--color-gold)] mx-auto mt-3 opacity-40"></div>
    </header>

    <!-- 导航栏 -->
    <nav class="flex justify-center gap-2 mb-8" id="main-nav">
      <button data-page="bazi" class="nav-btn bg-[var(--color-ink-light)] border-2 border-[var(--color-gold)] rounded-lg px-5 py-2 font-[var(--font-brush)] text-lg text-[var(--color-gold)] transition-all cursor-pointer">
        八字排盘
      </button>
      <button data-page="liuyao" class="nav-btn bg-[var(--color-ink)] border-2 border-[var(--color-gold)]/30 rounded-lg px-5 py-2 font-[var(--font-brush)] text-lg text-[var(--color-parchment-dark)] transition-all cursor-pointer">
        六爻占卜
      </button>
      <button data-page="calendar" class="nav-btn bg-[var(--color-ink)] border-2 border-[var(--color-gold)]/30 rounded-lg px-5 py-2 font-[var(--font-brush)] text-lg text-[var(--color-parchment-dark)] transition-all cursor-pointer">
        万年历
      </button>
      <button data-page="history" class="nav-btn bg-[var(--color-ink)] border-2 border-[var(--color-gold)]/30 rounded-lg px-5 py-2 font-[var(--font-brush)] text-lg text-[var(--color-parchment-dark)] transition-all cursor-pointer">
        历史记录
      </button>
    </nav>

    <!-- ===== 八字排盘页面 ===== -->
    <section id="page-bazi" class="page-section">
      <div id="bazi-input" class="mb-8"></div>
      <section id="bazi-result" class="hidden">
        <div id="export-bar" class="hidden mb-4 flex justify-center gap-3">
          <button id="btn-export-img" class="bg-[var(--color-gold)]/20 border border-[var(--color-gold)]/30 rounded-lg px-4 py-2 text-[var(--color-gold)] text-sm cursor-pointer transition-all">📸 导出图片</button>
          <button id="btn-export-text" class="bg-[var(--color-gold)]/20 border border-[var(--color-gold)]/30 rounded-lg px-4 py-2 text-[var(--color-gold)] text-sm cursor-pointer transition-all">📋 复制文字</button>
        </div>
        <div id="chart-area" class="mb-8"></div>
        <div id="analysis-area" class="mb-8"></div>
        <div id="dayun-area" class="mb-8"></div>
        <div id="reading-area" class="mb-8"></div>
      </section>
    </section>

    <!-- ===== 六爻占卜页面 ===== -->
    <section id="page-liuyao" class="page-section hidden">
      <div id="liuyao-input" class="mb-8"></div>
      <section id="liuyao-result" class="hidden">
        <div id="liuyao-chart" class="mb-8"></div>
        <div id="liuyao-reading" class="mb-8"></div>
      </section>
    </section>

    <!-- ===== 万年历页面 ===== -->
    <section id="page-calendar" class="page-section hidden">
      <div id="calendar-main"></div>
    </section>

    <!-- ===== 历史记录页面 ===== -->
    <section id="page-history" class="page-section hidden">
      <div id="history-list"></div>
    </section>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
